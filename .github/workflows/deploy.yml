name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            # Clonar el repo si no existe, si existe hacer pull
            if [ ! -d "/app/Kontrol" ]; then
              sudo mkdir -p /app
              sudo chown $USER:$USER /app
              git clone https://github.com/PabloVS044/Kontrol.git /app/Kontrol
            else
              cd /app/Kontrol
              git pull origin main
            fi

            cd /app/Kontrol

            # Escribir el .env raíz con los secrets (lo lee docker-compose.prod.yml)
            {
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}"
              echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
            } > .env

            # Rebuild y restart (postgres arranca primero gracias al healthcheck)
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Limpiar imágenes viejas
            docker image prune -f
